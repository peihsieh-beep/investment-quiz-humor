  <style>

    :root{
      --bg:#111214;
      --card:#1b1c1f;
      --card-2:#25262a;
      --text:#fffaf2;
      --muted:#b9b2aa;
      --line:#3b3d42;
      --primary:#ff6a00;
      --secondary:#ff9f43;
      --yellow:#ffb25b;
      --cyan:#ffd0a3;
      --shadow:0 18px 60px rgba(0,0,0,.38);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,106,0,.22), transparent 25%),
        radial-gradient(circle at 85% 15%, rgba(255,159,67,.16), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255,178,91,.10), transparent 28%),
        var(--bg);
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.13;
      background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size:36px 36px;
      mask-image:linear-gradient(to bottom,black,transparent 80%);
    }
    .wrap{
      width:min(860px, calc(100% - 28px));
      margin:0 auto;
      padding:34px 0 56px;
      position:relative;
      z-index:1;
    }
    .hero{
      text-align:center;
      margin-bottom:24px;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border:2px solid var(--text);
      border-radius:999px;
      background:var(--yellow);
      color:#171717;
      font-size:14px;
      font-weight:950;
      box-shadow:5px 5px 0 #000;
      transform:rotate(-1.5deg);
      margin-bottom:18px;
    }
    h1{
      margin:0;
      font-size:clamp(38px, 7vw, 68px);
      line-height:1.05;
      letter-spacing:-.05em;
      text-shadow:4px 4px 0 rgba(255,106,0,.38);
    }
    .hero p{
      color:var(--muted);
      margin:16px auto 0;
      max-width:650px;
      line-height:1.8;
      font-size:17px;
    }
    .card{
      position:relative;
      background:linear-gradient(180deg,var(--card),#15172a);
      border:2px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:30px;
      overflow:hidden;
    }
    .card:before{
      content:"";
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(255,106,0,.10);
      top:-45px;
      right:-35px;
      filter:blur(4px);
    }
    .progress-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:12px;
      font-size:14px;
      color:var(--muted);
      font-weight:800;
    }
    .progress{
      height:12px;
      background:#0d0f1d;
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:28px;
    }
    .progress > span{
      display:block;
      height:100%;
      width:10%;
      background:linear-gradient(90deg,#ff6a00,#ff934d,#ffb25b);
      border-radius:999px;
      transition:width .25s ease;
    }
    .question{
      font-size:clamp(24px,4vw,31px);
      line-height:1.45;
      margin:0 0 22px;
      letter-spacing:-.02em;
    }
    .answers{
      display:grid;
      gap:13px;
    }
    .answer{
      border:2px solid var(--line);
      background:var(--card-2);
      border-radius:17px;
      padding:17px 18px;
      font-size:16px;
      line-height:1.65;
      text-align:left;
      cursor:pointer;
      transition:.16s ease;
      color:var(--text);
      box-shadow:0 5px 0 #0a0b13;
    }
    .answer:hover{
      border-color:var(--cyan);
      transform:translateY(-2px) rotate(-.2deg);
    }
    .answer.selected{
      border-color:var(--yellow);
      background:#303453;
      box-shadow:0 0 0 3px rgba(255,178,91,.16),0 5px 0 #0a0b13;
    }
    .controls{
      display:flex;
      gap:12px;
      justify-content:space-between;
      margin-top:26px;
    }
    button{font:inherit}
    .btn{
      border:2px solid #0a0b13;
      border-radius:15px;
      padding:13px 19px;
      cursor:pointer;
      font-weight:950;
      transition:.16s ease;
      box-shadow:4px 4px 0 #000;
    }
    .btn-secondary{
      background:#d7d9e8;
      color:#1a1b26;
    }
    .btn-primary{
      background:var(--primary);
      color:#fff;
      margin-left:auto;
    }
    .btn:disabled{
      opacity:.35;
      cursor:not-allowed;
      box-shadow:none;
    }
    .btn:not(:disabled):hover{
      transform:translate(-1px,-1px);
      box-shadow:6px 6px 0 #000;
    }
    .hidden{display:none !important}
    .start{
      text-align:center;
      padding:44px 30px;
    }
    .start .icons{
      font-size:46px;
      letter-spacing:10px;
      margin-bottom:14px;
      filter:drop-shadow(3px 3px 0 #000);
    }
    .start h2,.result h2{
      font-size:clamp(30px,5vw,42px);
      margin:0 0 12px;
      letter-spacing:-.03em;
    }
    .start p{
      color:var(--muted);
      line-height:1.8;
      margin:0 auto 26px;
      max-width:560px;
    }
    .result{
      text-align:center;
    }
    .result-badge{
      width:min(150px,46vw);
      min-width:104px;
      height:108px;
      margin:0 auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0;
      padding:0 10px;
      font-size:50px;
      line-height:1;
      white-space:nowrap;
      overflow:hidden;
      border:3px solid #111;
      border-radius:31px;
      background:linear-gradient(145deg,#ff8a2a,#ffd0a3);
      box-shadow:7px 7px 0 #000;
      transform:rotate(-1deg);
    }
    .result-badge.double-emoji{
      width:min(168px,52vw);
      font-size:39px;
      letter-spacing:-5px;
    }
    .result-desc{
      color:var(--muted);
      max-width:640px;
      margin:0 auto 24px;
      line-height:1.85;
      font-size:16px;
    }
    .section{
      text-align:left;
      background:#131525;
      border:2px solid var(--line);
      padding:19px;
      border-radius:18px;
      margin-top:17px;
    }
    .section h3{
      margin:0 0 12px;
      font-size:18px;
    }
    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:9px;
    }
    .tag{
      padding:9px 12px;
      border-radius:999px;
      background:#252844;
      border:1px solid #4a4e75;
      font-size:14px;
      font-weight:850;
      color:var(--cyan);
    }
    .recommend-title{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .recommend-title h3{margin:0;font-size:21px}
    .recommend-title span{font-size:13px;color:var(--muted)}
    .course-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
      margin-top:14px;
      text-align:left;
    }
    .course-card{
      background:#20233a;
      border:2px solid #3a3e61;
      border-radius:18px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-width:0;
      transition:.18s ease;
      box-shadow:0 7px 0 #0a0b13;
    }
    .course-card:hover{
      transform:translateY(-4px) rotate(-.3deg);
      border-color:var(--primary);
    }
    .course-cover{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      background:#eef1f5;
      display:block;
      filter:saturate(.92) contrast(1.04);
    }
    .course-body{
      padding:15px;
      display:flex;
      flex-direction:column;
      flex:1;
    }
    .course-title{
      font-weight:950;
      line-height:1.45;
      font-size:16px;
      margin:0 0 8px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .course-desc{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .course-categories{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-bottom:10px;
    }
    .course-category{
      font-size:12px;
      font-weight:850;
      color:#171717;
      background:var(--secondary);
      padding:5px 8px;
      border-radius:999px;
    }
    .course-link{
      margin-top:auto;
      padding-top:14px;
      color:#171717;
      background:var(--yellow);
      border-radius:11px;
      display:block;
      padding:10px 12px;
      text-align:center;
      text-decoration:none;
      font-size:14px;
      font-weight:950;
      border:2px solid #111;
      box-shadow:3px 3px 0 #000;
    }

      .wrap{width:min(100% - 18px,860px);padding-top:18px}
      .card{padding:20px}
      .question{font-size:22px}
      .course-grid{grid-template-columns:1fr}
      .controls{gap:8px}
      .btn{padding:12px 14px}
      .result-badge{height:94px;font-size:44px}
      .result-badge.double-emoji{width:min(145px,58vw);font-size:33px}
      .recommend-title{align-items:flex-start;flex-direction:column}
    }

  </style>
</head>

      <button class="btn btn-primary" onclick="startQuiz()">開始公開處刑</button>
    </section>

    <section id="quizScreen" class="card hidden">
      <div class="progress-head">
        <span id="counter">第 1 題，共 10 題</span>

      <div class="progress"><span id="progressBar"></span></div>
      <h2 id="questionText" class="question"></h2>
      <div id="answers" class="answers"></div>
      <div class="controls">
        <button id="prevBtn" class="btn btn-secondary" onclick="prevQuestion()">上一題</button>
        <button id="nextBtn" class="btn btn-primary" onclick="nextQuestion()" disabled>下一題</button>
      </div>
    </section>

    <section id="resultScreen" class="card result hidden">
      <div id="resultEmoji" class="result-badge">📈</div>
      <h2 id="resultTitle"></h2>
      <p id="resultDesc" class="result-desc"></p>

      <div class="section">

        <div id="courseGrid" class="course-grid"></div>
      </div>

      <button class="btn btn-primary" style="margin-top:22px" onclick="restartQuiz()">不服？再測一次</button>
    </section>
  </main>

let current = 0;

let runtimeQuestions = [];

function shuffledCopy(items){
  const copy = [...items];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function prepareQuestions(){
  runtimeQuestions = questions.map(question => ({
    ...question,
    options: shuffledCopy(question.options)
  }));
}


function escapeHtml(value){
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
function escapeAttribute(value){ return escapeHtml(value); }

function startQuiz(){
  prepareQuestions();
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  renderQuestion();
}
function renderQuestion(){
  const q = runtimeQuestions[current];
  document.getElementById("counter").textContent = `第 ${current+1} 題，共 ${questions.length} 題`;
  const pct = Math.round(((current+1)/questions.length)*100);
  document.getElementById("percent").textContent = pct + "%";
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("questionText").textContent = q.q;

  const box = document.getElementById("answers");
  box.innerHTML = "";
  q.options.forEach((opt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "answer" + (answers[current] === idx ? " selected" : "");
    btn.textContent = opt.t;
    btn.onclick = ()=>selectAnswer(idx);
    box.appendChild(btn);
  });

  document.getElementById("prevBtn").disabled = current === 0;
  document.getElementById("nextBtn").disabled = answers[current] === null;
  document.getElementById("nextBtn").textContent = current === questions.length-1 ? "看結果" : "下一題";
}
function selectAnswer(idx){
  answers[current] = idx;
  renderQuestion();
}
function prevQuestion(){
  if(current>0){ current--; renderQuestion(); }
}
function nextQuestion(){
  if(answers[current] === null) return;
  if(current < questions.length-1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}
function calculate(){
  const ps = {A:0,B:0,C:0,D:0,E:0};
  const tags = {};
  answers.forEach((ans, i)=>{
    const opt = runtimeQuestions[i].options[ans];
    ps[opt.p] += 2;
    opt.tags.forEach((tag, idx)=>{
      tags[tag] = (tags[tag] || 0) + (idx===0 ? 2 : 1);
    });
  });
  return {ps,tags};
}
function showResult(){
  const {ps,tags} = calculate();
  const ranked = Object.entries(ps).sort((a,b)=>b[1]-a[1]);
  const first = ranked[0], second = ranked[1];
  let title, emoji, desc;

  if(first[1] - second[1] <= 2){
    const code = [first[0],second[0]].sort().join("");
    title = mixedNames[code] || `${personas[first[0]].name} × ${personas[second[0]].name}`;
    emoji = personas[first[0]].emoji + personas[second[0]].emoji;
    desc = `恭喜，你不是單純一型，你是「${personas[first[0]].name}」和「${personas[second[0]].name}」的混合生物。${personas[first[0]].desc}`;
  }else{
    title = personas[first[0]].name;
    emoji = personas[first[0]].emoji;
    desc = personas[first[0]].desc;
  }

  let courseRank = Object.entries(tags).sort((a,b)=>b[1]-a[1]);

  // 新手與賭狗保護：避免直接把高風險工具排在最前面
  if(first[0] === "A" || first[0] === "E"){
    const risky = ["當沖","期貨選擇權"];
    courseRank = courseRank.sort((a,b)=>{
      const ar = risky.includes(a[0]) ? 1 : 0;
      const br = risky.includes(b[0]) ? 1 : 0;
      if(ar !== br) return ar-br;
      return b[1]-a[1];
    });
  }

  const topCourses = courseRank.slice(0,4);

  // 依分類分數計算每個專欄的符合程度
  const recommended = courses
    .map((course, index) => {
      const matched = course.categories
        .map(category => ({category, score: tags[category] || 0}))
        .filter(item => item.score > 0)
        .sort((a,b) => b.score - a.score);
      let score = matched.reduce((sum, item, idx) => sum + item.score * (idx === 0 ? 2 : 1), 0);

      // 賭狗型優先導向技術、籌碼與盤勢判讀，不直接鼓勵高槓桿或當沖
      if(first[0] === "E"){
        if(course.categories.includes("技術分析")) score += 5;
        if(course.categories.includes("籌碼分析")) score += 4;
        if(course.categories.includes("盤勢分析")) score += 3;
        if(course.categories.includes("當沖")) score -= 3;
        if(course.categories.includes("期貨選擇權")) score -= 5;
      }

      return {...course, score, matched, index};
    })
    .sort((a,b) => b.score - a.score || b.matched.length - a.matched.length || a.index - b.index)
    .slice(0,4);

  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  const emojiEl = document.getElementById("resultEmoji");
  emojiEl.textContent = emoji;
  emojiEl.classList.toggle("double-emoji", Array.from(emoji).length > 1);
  document.getElementById("resultTitle").textContent = `診斷結果：${title}`;
  document.getElementById("resultDesc").textContent = desc;

  const tagBox = document.getElementById("courseTags");
  tagBox.innerHTML = "";
  topCourses.forEach(([name])=>{
    const span = document.createElement("span");
    span.className = "tag";
    span.textContent = name;
    tagBox.appendChild(span);
  });

  const courseBox = document.getElementById("courseGrid");
  courseBox.innerHTML = "";
  recommended.forEach(course => {
    const card = document.createElement("article");
    card.className = "course-card";

    const labels = course.categories
      .map(category => `<span class="course-category">${escapeHtml(category)}</span>`)
      .join("");

    card.innerHTML = `
      <img class="course-cover" src="${escapeAttribute(course.image)}" alt="${escapeAttribute(course.title)}封面"
           onerror="this.onerror=null;this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22600%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23eef1f5%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23667085%22 font-size=%2230%22%3E專欄封面%3C/text%3E%3C/svg%3E'">
      <div class="course-body">
        <div class="course-categories">${labels}</div>
        <h4 class="course-title">${escapeHtml(course.title)}</h4>
        <p class="course-desc">${escapeHtml(course.description)}</p>
        <a class="course-link" href="${escapeAttribute(course.url)}" target="_blank" rel="noopener noreferrer">去看看能不能救</a>
      </div>`;
    courseBox.appendChild(card);
  });
}
function restartQuiz(){
  current = 0;
  answers = Array(questions.length).fill(null);
  prepareQuestions();
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}
</script>
